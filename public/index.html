<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Секундомер</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>⏱ Секундомер</h1>
    
    <div class="display" id="display">00:00:00.00</div>
    
    <div class="controls">
      <button id="startBtn" class="btn btn-green">▶ Старт</button>
      <button id="pauseBtn" class="btn btn-yellow">⏸ Пауза</button>
      <button id="resetBtn" class="btn btn-red">🔄 Сброс</button>
      <button id="lapBtn" class="btn btn-blue">⏱ Круг</button>
    </div>
    
    <div class="laps">
      <h3>📋 Круги</h3>
      <ul id="lapList">
        <li class="empty-message">Нет кругов</li>
      </ul>
    </div>
    
    <div class="hotkeys">
      <small>⌨️ Горячие клавиши: Пробел (Старт/Пауза) | R (Сброс) | L (Круг)</small>
    </div>
  </div>
  
  <script src="../dist/renderer.js"></script>
</body>
</html>
